# Main configuration block
user nginx;
worker_processes 2;  # Match your 2 vCPUs
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;  # Increased for more concurrent connections
    use epoll;  # More efficient on Linux
    multi_accept on;  # Accept multiple connections at once
    worker_aio_requests 32;
}

http {
    # Use Docker's internal DNS resolver (Option 3)
    resolver 127.0.0.11 valid=300s;
    resolver_timeout 5s;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Rate limiting zone definition
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;  # Handle more requests per connection
    types_hash_max_size 2048;
    
    # Buffer optimizations for your 4GB memory
    client_body_buffer_size 128k;
    client_max_body_size 256m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    
    # Proxy buffering for FastAPI responses
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 8 8k;
    proxy_busy_buffers_size 16k;
    
    # Connection pooling to backend
    upstream fastapi_backend {
        server app:80;
        keepalive 32;  # Keep connections to FastAPI alive
    }
    
    # Gzip compression to reduce bandwidth
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    include /etc/nginx/conf.d/*.conf;

    # Redirect HTTP (port 8080) to HTTPS (port 443)
    server {
        listen 8080;
        server_name wls-assistant.virpluz.io;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server block for FastAPI app
    server {
        listen 443 ssl;
        http2 on;  # Enable HTTP/2 for better performance
        server_name wls-assistant.virpluz.io;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/virpluz.key;

        # Enhanced SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        
        # OCSP stapling
        #ssl_stapling on;
        #ssl_stapling_verify on; #reduces security and is not recommended as a long-term fix.

        # FastAPI app mounted at /
    location / {
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header Access-Control-Max-Age 1728000 always;
            add_header Content-Type 'text/plain; charset=utf-8' always;
            add_header Content-Length 0 always;
            return 204;
        }

        # Forward everything to FastAPI
        proxy_pass http://fastapi_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Add CORS headers for actual requests
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        # Security headers
        add_header Content-Security-Policy "upgrade-insecure-requests" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-transform" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Robots-Tag "none" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

        # Health check endpoint (no rate limiting)
        location /health {
            proxy_pass http://fastapi_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            access_log off;  # Don't log health checks
        }

        # Static files (e.g., /images/attachment.png)
        location /images/ {
            alias /usr/share/nginx/html/images/;
            try_files $uri $uri/ =404;
            expires 1d;  # Cache static files
            add_header Cache-Control "public, immutable";
        }
    }
}