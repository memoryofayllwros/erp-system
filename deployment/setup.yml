- name: Initial VM setup for ERP Assistant
  hosts: app
  become: true
  tasks:
    - name: Ensure git is installed
      apt:
        name: git
        state: present
      when: ansible_os_family == "Debian"

    - name: Ensure Docker is installed
      apt:
        name: docker.io
        state: present

    - name: Ensure Docker Compose is installed
      apt:
        name: docker-compose
        state: present

    - name: Create project directory
      file:
        path: /opt/erp-assistant
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Clone repo if not exists
      git:
        repo: 
        dest: /opt/erp-assistant
        version: main
        force: no   # don't overwrite if exists
      register: git_clone
